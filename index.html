<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruh Hali Müzik Terapisi</title>
<meta name="description" content="Ruh halinize göre kişiselleştirilmiş müzik terapi önerileri alın. Yapay zeka destekli müzik terapisi.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg-primary:#0a0a1a;
    --bg-secondary:#12122a;
    --bg-card:#1a1a3e;
    --accent-indigo:#6366f1;
    --accent-indigo-glow:#818cf830;
    --accent-green:#22c55e;
    --accent-green-glow:#22c55e30;
    --accent-purple:#a855f7;
    --text-primary:#e8e8f0;
    --text-secondary:#9999bb;
    --text-muted:#666688;
    --border-color:#2a2a55;
    --font-serif:'Playfair Display',Georgia,serif;
    --font-sans:'DM Sans','Segoe UI',sans-serif;
  }

  html{scroll-behavior:smooth}

  body{
    background:var(--bg-primary);
    background:linear-gradient(170deg,#0a0a1a 0%,#110e2e 40%,#0d0b22 100%);
    color:var(--text-primary);
    font-family:var(--font-sans);
    min-height:100vh;
    overflow-x:hidden;
    cursor:none;
    position:relative;
  }

  /* ───── custom cursor ───── */
  #cursor-dot{
    position:fixed;
    width:14px;height:14px;
    border-radius:50%;
    background:radial-gradient(circle,#c084fc 0%,#7c3aed 60%,transparent 100%);
    pointer-events:none;
    z-index:10000;
    transform:translate(-50%,-50%);
    box-shadow:0 0 18px 6px #a855f780,0 0 40px 10px #6366f140;
    transition:width .15s,height .15s;
    mix-blend-mode:screen;
  }

  /* ───── falling notes canvas ───── */
  #falling-notes{
    position:fixed;inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }

  .falling-note{
    position:absolute;
    color:#a855f730;
    font-size:24px;
    top:-40px;
    animation:fall linear infinite;
    pointer-events:none;
    user-select:none;
  }

  @keyframes fall{
    0%{transform:translateY(0) rotate(0deg);opacity:.7}
    100%{transform:translateY(110vh) rotate(360deg);opacity:0}
  }

  /* ───── cursor-spawned notes ───── */
  .cursor-note{
    position:fixed;
    pointer-events:none;
    z-index:9999;
    font-size:18px;
    animation:floatUp 1.4s ease-out forwards;
    user-select:none;
  }

  @keyframes floatUp{
    0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
    100%{opacity:0;transform:translateY(-90px) scale(.4) rotate(40deg)}
  }

  /* ───── main container ───── */
  .container{
    max-width:780px;
    margin:0 auto;
    padding:40px 20px 80px;
    position:relative;
    z-index:1;
  }

  /* ───── header ───── */
  .header{text-align:center;margin-bottom:48px}

  .header h1{
    font-family:var(--font-serif);
    font-size:clamp(2rem,5vw,2.8rem);
    font-weight:700;
    background:linear-gradient(135deg,#c084fc,#818cf8,#6366f1);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:-.5px;
    margin-bottom:8px;
  }

  .header p{
    color:var(--text-secondary);
    font-size:.95rem;
    letter-spacing:.3px;
  }

  /* ───── input area ───── */
  .input-area{
    display:flex;gap:10px;
    margin-bottom:18px;
  }

  .input-area input{
    flex:1;
    background:var(--bg-card);
    border:1px solid var(--border-color);
    border-radius:14px;
    padding:14px 20px;
    font-size:1rem;
    color:var(--text-primary);
    font-family:var(--font-sans);
    outline:none;
    transition:border-color .3s,box-shadow .3s;
  }

  .input-area input::placeholder{color:var(--text-muted)}
  .input-area input:focus{
    border-color:var(--accent-purple);
    box-shadow:0 0 0 3px #a855f720;
  }

  .input-area button{
    background:linear-gradient(135deg,var(--accent-indigo),var(--accent-purple));
    border:none;border-radius:14px;
    padding:14px 28px;
    color:#fff;font-weight:700;font-size:.95rem;
    font-family:var(--font-sans);
    cursor:none;
    transition:transform .15s,box-shadow .3s;
    white-space:nowrap;
  }

  .input-area button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 24px #6366f150;
  }
  .input-area button:active{transform:translateY(0)}

  /* ───── mood chips ───── */
  .chips{
    display:flex;flex-wrap:wrap;gap:8px;
    justify-content:center;
    margin-bottom:40px;
  }

  .chip{
    background:var(--bg-card);
    border:1px solid var(--border-color);
    border-radius:20px;
    padding:8px 18px;
    font-size:.85rem;
    color:var(--text-secondary);
    cursor:none;
    transition:all .25s;
    font-family:var(--font-sans);
  }

  .chip:hover{
    background:#6366f125;
    border-color:var(--accent-indigo);
    color:var(--text-primary);
    transform:translateY(-2px);
  }

  /* ───── loading ───── */
  .loader-wrap{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:16px;
    margin:50px 0;
  }
  .loader-wrap.active{display:flex}

  .spinner{
    width:44px;height:44px;
    border:3px solid var(--border-color);
    border-top-color:var(--accent-purple);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }

  @keyframes spin{to{transform:rotate(360deg)}}

  .loader-wrap p{color:var(--text-secondary);font-size:.9rem}

  /* ───── error ───── */
  .error-msg{
    display:none;
    background:#ef444420;
    border:1px solid #ef4444;
    border-radius:14px;
    padding:16px 20px;
    color:#fca5a5;
    text-align:center;
    margin-bottom:30px;
    font-size:.9rem;
  }
  .error-msg.active{display:block}

  /* ───── quote card ───── */
  .quote-card{
    display:none;
    background:linear-gradient(135deg,#1e1b4b80,#312e8140);
    border:1px solid #4338ca40;
    border-radius:18px;
    padding:28px 32px;
    text-align:center;
    margin-bottom:36px;
    animation:fadeSlideIn .6s ease-out;
  }
  .quote-card.active{display:block}

  .quote-card blockquote{
    font-family:var(--font-serif);
    font-style:italic;
    font-size:1.15rem;
    color:#e0e0ff;
    line-height:1.7;
    letter-spacing:.2px;
  }

  .quote-card blockquote::before{content:'"';font-size:1.6rem;color:var(--accent-purple);margin-right:4px}
  .quote-card blockquote::after{content:'"';font-size:1.6rem;color:var(--accent-purple);margin-left:4px}

  /* ───── results grid ───── */
  .results{
    display:none;
    grid-template-columns:1fr 1fr;
    gap:20px;
    animation:fadeSlideIn .6s ease-out;
  }
  .results.active{display:grid}

  @media(max-width:600px){
    .results.active{grid-template-columns:1fr}
  }

  @keyframes fadeSlideIn{
    0%{opacity:0;transform:translateY(20px)}
    100%{opacity:1;transform:translateY(0)}
  }

  .column-header{
    font-family:var(--font-serif);
    font-size:1.15rem;
    font-weight:700;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:2px solid;
  }

  .col-current .column-header{
    color:#a5b4fc;
    border-color:var(--accent-indigo);
  }

  .col-healing .column-header{
    color:#86efac;
    border-color:var(--accent-green);
  }

  /* ───── song card ───── */
  .song-card{
    background:var(--bg-card);
    border:1px solid var(--border-color);
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:12px;
    transition:transform .2s,box-shadow .3s,border-color .3s;
    animation:fadeSlideIn .5s ease-out both;
  }

  .song-card:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 30px #00000060;
  }

  .col-current .song-card:hover{border-color:#6366f160}
  .col-healing .song-card:hover{border-color:#22c55e60}

  .song-title{
    font-weight:700;
    font-size:.95rem;
    color:var(--text-primary);
    margin-bottom:2px;
  }

  .song-artist{
    font-size:.82rem;
    color:var(--text-secondary);
    margin-bottom:6px;
  }

  .song-reason{
    font-size:.78rem;
    color:var(--text-muted);
    font-style:italic;
    margin-bottom:12px;
    line-height:1.4;
  }

  .song-actions{
    display:flex;gap:8px;
  }

  .btn-icon{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:8px 14px;
    border-radius:10px;
    border:none;
    font-size:.78rem;
    font-weight:600;
    font-family:var(--font-sans);
    cursor:none;
    transition:all .2s;
    text-decoration:none;
    flex:1;
    text-align:center;
  }

  .btn-yt{
    background:#ff000018;
    color:#f87171;
    border:1px solid #ff000030;
  }
  .btn-yt:hover{
    background:#ff000030;
    transform:translateY(-1px);
    box-shadow:0 4px 12px #ff000020;
  }

  .btn-sp{
    background:#1db95418;
    color:#4ade80;
    border:1px solid #1db95430;
  }
  .btn-sp:hover{
    background:#1db95430;
    transform:translateY(-1px);
    box-shadow:0 4px 12px #1db95420;
  }

  .btn-icon svg{width:16px;height:16px;flex-shrink:0}

  /* ───── footer ───── */
  .footer{
    text-align:center;
    margin-top:60px;
    padding-top:24px;
    border-top:1px solid var(--border-color);
    color:var(--text-muted);
    font-size:.78rem;
  }
</style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor-dot"></div>

<!-- Falling notes container -->
<div id="falling-notes"></div>

<!-- Main content -->
<div class="container">
  <header class="header" id="header">
    <h1>Ruh Hali Müzik Terapisi</h1>
    <p>Ruh haline göre yapay zekâ destekli müzik önerileri</p>
  </header>

  <div class="input-area" id="input-area">
    <input type="text" id="mood-input" placeholder="Şu anki ruh halini yaz..." autocomplete="off">
    <button id="submit-btn" onclick="handleSubmit()">Keşfet</button>
  </div>

  <div class="chips" id="chips">
    <button class="chip" onclick="selectChip(this)">Hüzünlü</button>
    <button class="chip" onclick="selectChip(this)">Mutlu</button>
    <button class="chip" onclick="selectChip(this)">Stresli</button>
    <button class="chip" onclick="selectChip(this)">Yalnız</button>
    <button class="chip" onclick="selectChip(this)">Nostaljik</button>
    <button class="chip" onclick="selectChip(this)">Motive</button>
    <button class="chip" onclick="selectChip(this)">Huzurlu</button>
    <button class="chip" onclick="selectChip(this)">Kızgın</button>
  </div>

  <div class="loader-wrap" id="loader">
    <div class="spinner"></div>
    <p>Müzik terapistin hazırlanıyor...</p>
  </div>

  <div class="error-msg" id="error"></div>

  <div class="quote-card" id="quote-card">
    <blockquote id="quote-text"></blockquote>
  </div>

  <div class="results" id="results">
    <div class="col-current" id="col-current">
      <div class="column-header">Şu An İçin 🎵</div>
    </div>
    <div class="col-healing" id="col-healing">
      <div class="column-header">İyileşmek İçin 🌱</div>
    </div>
  </div>

  <footer class="footer">Yapay zekâ destekli müzik terapi önerileri · Ruh Hali © 2026</footer>
</div>

<script>
// ───────────────────────────────────
// CUSTOM CURSOR
// ───────────────────────────────────
const cursorDot = document.getElementById('cursor-dot');
let mouseX = -100, mouseY = -100;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursorDot.style.left = mouseX + 'px';
  cursorDot.style.top = mouseY + 'px';
  spawnCursorNote(mouseX, mouseY);
});

// ───────────────────────────────────
// CURSOR NOTE SPAWNER
// ───────────────────────────────────
const NOTES = ['♩','♪','♫','♬','𝄞'];
const NOTE_COLORS = ['#c084fc','#818cf8','#a78bfa','#e879f9','#67e8f9'];
let lastSpawn = 0;

function spawnCursorNote(x, y) {
  const now = Date.now();
  if (now - lastSpawn < 80) return;
  lastSpawn = now;

  const el = document.createElement('span');
  el.className = 'cursor-note';
  el.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
  el.style.left = (x + (Math.random() - .5) * 30) + 'px';
  el.style.top = (y + (Math.random() - .5) * 20) + 'px';
  el.style.color = NOTE_COLORS[Math.floor(Math.random() * NOTE_COLORS.length)];
  el.style.fontSize = (14 + Math.random() * 12) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// ───────────────────────────────────
// FALLING NOTES
// ───────────────────────────────────
const fallingContainer = document.getElementById('falling-notes');

function createFallingNote() {
  const el = document.createElement('span');
  el.className = 'falling-note';
  el.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
  const size = 16 + Math.random() * 28;
  const duration = 6 + Math.random() * 12;
  el.style.left = Math.random() * 100 + '%';
  el.style.fontSize = size + 'px';
  el.style.animationDuration = duration + 's';
  el.style.animationDelay = Math.random() * 2 + 's';
  fallingContainer.appendChild(el);
  setTimeout(() => el.remove(), (duration + 2) * 1000);
}

setInterval(createFallingNote, 400);
for (let i = 0; i < 15; i++) createFallingNote();

// ───────────────────────────────────
// MOOD CHIPS
// ───────────────────────────────────
const moodInput = document.getElementById('mood-input');

function selectChip(chip) {
  moodInput.value = chip.textContent;
  handleSubmit();
}

moodInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});

// ───────────────────────────────────
// SVG ICONS
// ───────────────────────────────────
const ytIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.9 31.9 0 0 0 0 12a31.9 31.9 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.9 31.9 0 0 0 24 12a31.9 31.9 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>`;
const spIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.5 17.3c-.2.3-.6.4-1 .2-2.7-1.6-6-2-10-1.1-.4.1-.8-.2-.8-.6-.1-.4.2-.8.6-.8 4.3-1 8-0.6 11 1.2.3.2.4.7.2 1.1zm1.5-3.3c-.3.4-.8.6-1.2.3-3-1.9-7.7-2.4-11.3-1.3-.5.1-1-.1-1.1-.6-.1-.5.1-1 .6-1.1 4.1-1.3 9.2-.7 12.7 1.5.3.2.5.8.3 1.2zm.1-3.4C15.4 8.3 9 8.1 5.2 9.3c-.6.2-1.1-.2-1.3-.7-.2-.6.2-1.1.7-1.3C9 6 16 6.2 20.1 9c.5.3.7 1 .4 1.5-.3.4-.9.6-1.4.3v-.2z"/></svg>`;

// ───────────────────────────────────
// API CALL & RENDERING
// ───────────────────────────────────
const API_URL = '/api/recommend';

const loader = document.getElementById('loader');
const errorEl = document.getElementById('error');
const quoteCard = document.getElementById('quote-card');
const quoteText = document.getElementById('quote-text');
const resultsEl = document.getElementById('results');
const colCurrent = document.getElementById('col-current');
const colHealing = document.getElementById('col-healing');

async function handleSubmit() {
  const mood = moodInput.value.trim();
  if (!mood) { moodInput.focus(); return; }

  // Reset UI
  errorEl.classList.remove('active');
  quoteCard.classList.remove('active');
  resultsEl.classList.remove('active');
  loader.classList.add('active');

  const prompt = `Sen bir müzik terapi asistanısın. Kullanıcının ruh haline göre JSON döndür.
KURALLAR: Sadece JSON döndür, başka hiçbir şey yazma. reason maksimum 8 Türkçe kelime. Gerçek bilinen sanatçı öner.
ÇEŞİTLİLİK: Her zaman aynı popüler şarkıları önerme. Farklı türlerden (Klasik, Caz, Rock, Anadolu Rock, Pop vb.) ve hem eski hem yeni parçalardan karışık bir seçki sun.
quote kuralı: ruh hali olumsuzsa ona uygun kısa bir Türkçe atasözü veya deyim; olumluysa motivasyon sözü yaz. Maksimum 15 kelime.

FORMAT:
{
  "quote": "",
  "current_mood":[{"artist":"","title":"","reason":""}],
  "healing_mood":[{"artist":"","title":"","reason":""}]
}

current_mood → bu ruh haline uyan 5 farklı şarkı
healing_mood → ruh halini pozitife çevirecek 5 farklı şarkı
Ruh hali: ${mood}`;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`API hatası (${res.status}): ${errBody.slice(0, 200)}`);
    }

    const data = await res.json();
    const raw = data.content?.[0]?.text || '';

    // Extract JSON from response (handle possible markdown wrapping)
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('API yanıtından JSON ayrıştırılamadı.');

    const parsed = JSON.parse(jsonMatch[0]);

    renderResults(parsed);
  } catch (err) {
    errorEl.textContent = '⚠️ ' + err.message;
    errorEl.classList.add('active');
  } finally {
    loader.classList.remove('active');
  }
}

function renderResults(data) {
  // Quote
  if (data.quote) {
    quoteText.textContent = data.quote;
    quoteCard.classList.add('active');
  }

  // Clear previous song cards (keep headers)
  colCurrent.querySelectorAll('.song-card').forEach(c => c.remove());
  colHealing.querySelectorAll('.song-card').forEach(c => c.remove());

  // Render songs
  (data.current_mood || []).forEach((s, i) => {
    colCurrent.appendChild(createSongCard(s, i));
  });

  (data.healing_mood || []).forEach((s, i) => {
    colHealing.appendChild(createSongCard(s, i));
  });

  resultsEl.classList.add('active');

  // Scroll to quote
  quoteCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function createSongCard(song, idx) {
  const card = document.createElement('div');
  card.className = 'song-card';
  card.style.animationDelay = (idx * .1) + 's';

  const query = encodeURIComponent(song.artist + ' ' + song.title);
  const ytUrl = `https://www.youtube.com/results?search_query=${query}`;
  const spUrl = `https://open.spotify.com/search/${query}`;

  card.innerHTML = `
    <div class="song-title">${esc(song.title)}</div>
    <div class="song-artist">${esc(song.artist)}</div>
    <div class="song-reason">${esc(song.reason)}</div>
    <div class="song-actions">
      <a class="btn-icon btn-yt" href="${ytUrl}" target="_blank" rel="noopener">${ytIcon} YouTube</a>
      <a class="btn-icon btn-sp" href="${spUrl}" target="_blank" rel="noopener">${spIcon} Spotify</a>
    </div>`;
  return card;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
</script>
</body>
</html>
